<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>团队明细 - 数字人民币推广落地开启</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #c8102e;
    --primary-dark: #a00d24;
    --primary-light: #e8253d;
    --accent: #ffd100;
    --accent-light: #ffe44d;
    --bg: #fafbfc;
    --text: #1a1a1a;
    --text-secondary: #5a5a5a;
    --border: #e8e8e8;
    --shadow: 0 4px 20px rgba(200, 16, 46, 0.08);
    --shadow-lg: 0 8px 32px rgba(200, 16, 46, 0.12);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    line-height: 1.6;
  }

  /* ===== Header ===== */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    padding: 0;
    box-shadow: 0 4px 24px rgba(200, 16, 46, 0.25);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
      radial-gradient(circle at 20% 50%, rgba(255, 209, 0, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.05) 0%, transparent 40%);
    pointer-events: none;
  }

  .header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
  }

  .logo {
    width: 56px;
    height: 56px;
    background: linear-gradient(145deg, var(--accent) 0%, #e6c200 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 
      0 4px 16px rgba(255, 209, 0, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
    flex-shrink: 0;
  }

  .logo-symbol {
    font-size: 32px;
    font-weight: 700;
    color: var(--primary-dark);
    font-family: "Times New Roman", serif;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
  }

  .title-group {
    flex: 1;
  }

  .title {
    font-family: "Noto Serif SC", serif;
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 2px;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    margin-bottom: 2px;
  }

  .subtitle {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 1px;
    font-weight: 500;
  }

  .header-decoration {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.1;
  }

  .header-decoration svg {
    width: 100px;
    height: 100px;
  }

  /* ===== Main Content ===== */
  .main {
    flex: 1;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 40px 40px;
  }

  .content-area {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    min-height: 400px;
    padding: 40px;
    position: relative;
  }

  .content-area::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 50%, var(--primary) 100%);
    border-radius: 16px 16px 0 0;
  }

  .page-title {
    font-family: "Noto Serif SC", serif;
    font-size: 28px;
    color: var(--primary);
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--accent);
  }

  .page-content {
    color: var(--text-secondary);
    font-size: 16px;
    line-height: 1.8;
  }

  .page-content h2 {
    font-family: "Noto Serif SC", serif;
    color: var(--primary);
    font-size: 20px;
    margin: 24px 0 16px;
  }

  .page-content > p {
    margin-bottom: 16px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    margin: 20px 0;
  }

  .stat-card {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
  }

  .stat-number {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 13px;
    opacity: 0.9;
  }

  .team-list {
    display: grid;
    gap: 16px;
    margin-top: 20px;
  }

  .team-member {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px;
    background: #fafafa;
    border-radius: 12px;
    transition: all 0.3s;
  }

  .team-member:hover {
    background: #f5f5f5;
    transform: translateX(4px);
  }

  .member-avatar {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--accent) 0%, #e6c200 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: var(--primary-dark);
    flex-shrink: 0;
  }

  .member-info {
    flex: 1;
  }

  .member-name {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .member-role {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .member-stats {
    text-align: right;
  }

  .member-stats .number {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
  }

  .member-stats .label {
    font-size: 11px;
    color: var(--text-secondary);
  }

  /* ===== Footer Navigation ===== */
  .footer {
    background: #ffffff;
    border-top: 1px solid var(--border);
    padding: 0;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.04);
    position: sticky;
    bottom: 0;
    z-index: 100;
  }

  .footer-nav {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-around;
    align-items: stretch;
  }

  .nav-item {
    flex: 1;
  }

  .nav-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 8px;
    text-decoration: none;
    color: var(--text-secondary);
    transition: all 0.3s ease;
    position: relative;
    cursor: pointer;
    height: 100%;
  }

  .nav-link::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
    transition: width 0.3s ease;
    border-radius: 0 0 3px 3px;
  }

  .nav-link:hover {
    background: rgba(200, 16, 46, 0.04);
    color: var(--primary);
  }

  .nav-link:hover::before {
    width: 60%;
  }

  .nav-link.active {
    color: var(--primary);
    background: rgba(200, 16, 46, 0.04);
  }

  .nav-link.active::before {
    width: 80%;
  }

  .nav-icon {
    width: 24px;
    height: 24px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-icon svg {
    width: 22px;
    height: 22px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
  }

  .nav-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-align: center;
  }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .header-content {
      padding: 16px 20px;
      gap: 16px;
    }

    .logo {
      width: 48px;
      height: 48px;
    }

    .logo-symbol {
      font-size: 28px;
    }

    .title {
      font-size: 20px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 12px;
    }

    .header-decoration {
      display: none;
    }

    .main {
      padding: 24px 16px;
    }

    .content-area {
      padding: 28px 20px;
      min-height: 300px;
    }

    .page-title {
      font-size: 22px;
    }

    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .team-member {
      flex-wrap: wrap;
    }

    .member-stats {
      width: 100%;
      text-align: left;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .footer-nav {
      justify-content: space-between;
      padding: 0 4px;
    }

    .nav-link {
      padding: 12px 4px;
      flex: 1;
    }

    .nav-icon {
      width: 22px;
      height: 22px;
      margin-bottom: 3px;
    }

    .nav-icon svg {
      width: 20px;
      height: 20px;
    }

    .nav-label {
      font-size: 10px;
    }
  }
</style>
</head>
