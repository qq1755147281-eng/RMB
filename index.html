<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>数字人民币推广落地开启</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #c8102e;
    --primary-dark: #a00d24;
    --primary-light: #e8253d;
    --accent: #ffd100;
    --accent-light: #ffe44d;
    --bg: #fafbfc;
    --text: #1a1a1a;
    --text-secondary: #5a5a5a;
    --border: #e8e8e8;
    --shadow: 0 4px 20px rgba(200, 16, 46, 0.08);
    --shadow-lg: 0 8px 32px rgba(200, 16, 46, 0.12);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    line-height: 1.6;
  }

  /* ===== Header ===== */
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    padding: 0;
    box-shadow: 0 4px 24px rgba(200, 16, 46, 0.25);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
      radial-gradient(circle at 20% 50%, rgba(255, 209, 0, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.05) 0%, transparent 40%);
    pointer-events: none;
  }

  .header-content {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 40px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: relative;
  }

  .logo {
    width: 72px;
    height: 72px;
    background: linear-gradient(145deg, var(--accent) 0%, #e6c200 100%);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 
      0 4px 16px rgba(255, 209, 0, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.3);
    flex-shrink: 0;
  }

  .logo-symbol {
    font-size: 42px;
    font-weight: 700;
    color: var(--primary-dark);
    font-family: "Times New Roman", serif;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
  }

  .title-group {
    flex: 1;
  }

  .title {
    font-family: "Noto Serif SC", serif;
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 3px;
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 2px;
    font-weight: 500;
  }

  .header-decoration {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.1;
  }

  .header-decoration svg {
    width: 120px;
    height: 120px;
  }

  /* ===== Main Content ===== */
  .main {
    flex: 1;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 48px 40px;
  }

  .content-area {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    min-height: 400px;
    padding: 48px;
    position: relative;
  }

  .content-area::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 50%, var(--primary) 100%);
    border-radius: 16px 16px 0 0;
  }

  .editable-content {
    outline: none;
    min-height: 300px;
    padding: 20px;
    border: 2px dashed transparent;
    border-radius: 12px;
    transition: all 0.3s ease;
  }

  .editable-content:hover {
    border-color: var(--border);
    background: #fafafa;
  }

  .editable-content:focus {
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(200, 16, 46, 0.1);
  }

  .editable-content:empty::before {
    content: "在此编辑页面内容...";
    color: #aaa;
    font-style: italic;
    pointer-events: none;
  }

  .placeholder-text {
    color: var(--text-secondary);
    font-size: 16px;
    line-height: 1.8;
  }

  .placeholder-text h2 {
    font-family: "Noto Serif SC", serif;
    color: var(--primary);
    margin-bottom: 16px;
    font-size: 24px;
  }

  .placeholder-text p {
    margin-bottom: 16px;
  }

  /* ===== Footer Navigation ===== */
  .footer {
    background: #ffffff;
    border-top: 1px solid var(--border);
    padding: 0;
    box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.04);
    position: sticky;
    bottom: 0;
    z-index: 100;
  }

  .footer-nav {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-around;
    align-items: stretch;
    gap: 0;
  }

  .nav-item {
    flex: 1;
  }

  .nav-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 8px;
    text-decoration: none;
    color: var(--text-secondary);
    transition: all 0.3s ease;
    position: relative;
    cursor: pointer;
    height: 100%;
  }

  .nav-link::before {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
    transition: width 0.3s ease;
    border-radius: 0 0 3px 3px;
  }

  .nav-link:hover {
    background: linear-gradient(180deg, rgba(200, 16, 46, 0.04) 0%, transparent 100%);
    color: var(--primary);
  }

  .nav-link:hover::before {
    width: 60%;
  }

  .nav-link.active {
    color: var(--primary);
  }

  .nav-link.active::before {
    width: 80%;
  }

  .nav-icon {
    width: 28px;
    height: 28px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .nav-icon svg {
    width: 22px;
    height: 22px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
  }

  .nav-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-align: center;
  }

  .nav-divider {
    width: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  /* ===== Responsive ===== */
  @media (max-width: 768px) {
    .header-content {
      padding: 24px 20px;
      flex-direction: column;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
    }

    .logo-symbol {
      font-size: 36px;
    }

    .title {
      font-size: 24px;
      letter-spacing: 2px;
    }

    .main {
      padding: 24px 16px;
    }

    .content-area {
      padding: 32px 24px;
      min-height: 300px;
    }

    .footer-nav {
      justify-content: space-between;
      padding: 0 8px;
    }

    .nav-link {
      padding: 12px 4px;
      flex: 1;
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      margin-bottom: 4px;
    }

    .nav-icon svg {
      width: 20px;
      height: 20px;
    }

    .nav-label {
      font-size: 11px;
      letter-spacing: 0;
    }

    .nav-divider {
      display: none;
    }
  }
</style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <span class="logo-symbol">¥</span>
      </div>
      <div class="title-group">
        <h1 class="title">数字人民币推广落地开启</h1>
        <p class="subtitle">E-CNY · 数字时代的法定货币</p>
      </div>
      <div class="header-decoration">
        <svg viewBox="0 0 100 100" fill="none">
          <circle cx="50" cy="50" r="45" stroke="white" stroke-width="2"/>
          <circle cx="50" cy="50" r="35" stroke="white" stroke-width="1"/>
          <text x="50" y="60" text-anchor="middle" font-size="30" fill="white" font-family="serif">¥</text>
        </svg>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main">
    <div class="content-area">
      <div class="editable-content" contenteditable="true">
        <div class="placeholder-text">
          <h2>欢迎使用数字人民币推广平台</h2>
          <p>数字人民币（e-CNY）是由中国人民银行发行的数字形式法定货币，具有国家信用支撑，是数字化时代的重要金融基础设施。</p>
          <p>本平台致力于推动数字人民币的普及与应用，为用户提供便捷、安全、普惠的数字支付服务。</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer Navigation -->
  <footer class="footer">
    <nav class="footer-nav">
      <a href="#" class="nav-link active">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </span>
        <span class="nav-label">首页</span>
      </a>
      <div class="nav-divider"></div>
      <a href="#" class="nav-link">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </span>
        <span class="nav-label">推广制度</span>
      </a>
      <div class="nav-divider"></div>
      <a href="#" class="nav-link">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </span>
        <span class="nav-label">团队明细</span>
      </a>
      <div class="nav-divider"></div>
      <a href="#" class="nav-link">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
        </span>
        <span class="nav-label">联系我们</span>
      </a>
    </nav>
  </footer>

  <script>
    // Click to edit content
    const editableContent = document.querySelector('.editable-content');
    
    editableContent.addEventListener('click', function(e) {
      if (e.target === this) {
        this.focus();
      }
    });

    // Remove placeholder on focus
    editableContent.addEventListener('focus', function() {
      const placeholder = this.querySelector('.placeholder-text');
      if (placeholder) {
        placeholder.style.display = 'none';
      }
    });

    // Show placeholder if empty on blur
    editableContent.addEventListener('blur', function() {
      if (this.textContent.trim() === '') {
        const placeholder = document.createElement('div');
        placeholder.className = 'placeholder-text';
        placeholder.innerHTML = `
          <h2>欢迎使用数字人民币推广平台</h2>
          <p>数字人民币（e-CNY）是由中国人民银行发行的数字形式法定货币，具有国家信用支撑，是数字化时代的重要金融基础设施。</p>
          <p>本平台致力于推动数字人民币的普及与应用，为用户提供便捷、安全、普惠的数字支付服务。</p>
        `;
        this.appendChild(placeholder);
      }
    });
  </script>

</body>
</html>
