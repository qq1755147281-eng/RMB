<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万剑归宗 - 修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { 
            background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; width: 100vw; overflow: hidden; perspective: 1000px; 
            padding: 8px;
        }

        /* 控制区基础样式 */
        .controls {
            width: 100%;
            max-width: 600px;
            flex: 0 0 20%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
        }

        .control-row {
            display: flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: center;
            margin-bottom: 4px;
        }

        button {
            padding: 6px 10px; 
            background: #222; 
            color: #fff; 
            border: 2px solid #555;
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 11px; 
            font-weight: 500;
            transition: all 0.2s; 
            white-space: nowrap;
            min-height: 34px;
            flex: 0 0 auto;
        }

        button:hover {
            background: #333;
            border-color: #00aaff;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* 中等屏幕适配（平板/大屏手机） */
        @media (max-width: 768px) {
            body {
                padding: 8px;
            }
            
            .grid-container {
                flex: 0 0 80% !important;
                max-width: 90vw;
                max-height: 80vh;
                aspect-ratio: 1 / 1 !important;
            }
            
            .controls {
                flex: 0 0 20% !important;
                max-width: 100%;
            }
            
            button {
                padding: 5px 8px !important;
                font-size: 10px !important;
                min-height: 32px;
                border-radius: 5px;
            }
            
            .control-row {
                gap: 3px;
                margin-bottom: 3px;
            }

            .text-input {
                padding: 5px 8px !important;
                font-size: 10px !important;
                width: 100px;
                min-height: 32px;
            }

            .text-explode-btn {
                padding: 5px 10px !important;
                font-size: 10px !important;
                min-height: 32px;
            }
        }

        /* 小屏手机适配 */
        @media (max-width: 480px) {
            body {
                padding: 6px;
            }
            
            .grid-container {
                flex: 0 0 80% !important;
                max-width: 92vw;
                max-height: 80vh;
                aspect-ratio: 1 / 1 !important;
                gap: 2px;
            }
            
            button {
                padding: 4px 6px !important;
                font-size: 9px !important;
                min-height: 28px;
                border-radius: 4px;
            }
            
            .control-row {
                gap: 2px;
                margin-bottom: 2px;
            }
        }

        /* 超小屏手机适配 */
        @media (max-width: 360px) {
            body {
                padding: 4px;
            }
            
            .grid-container {
                flex: 0 0 80% !important;
                max-width: 94vw;
                max-height: 80vh;
                aspect-ratio: 1 / 1 !important;
                gap: 2px;
            }
            
            button {
                padding: 3px 5px !important;
                font-size: 8px !important;
                min-height: 24px;
                border-radius: 3px;
            }
            
            .control-row {
                gap: 2px;
                margin-bottom: 1px;
            }
        }
        
        /* 修复：网格自适应高度，不再被挤没 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 3px;
            flex: 0 0 80%;
            width: auto;
            max-width: 90vw;
            max-height: 80vh;
            aspect-ratio: 1 / 1;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            margin-top: 0;
        }

        .cell {
            background: #1a1a1a; border: 1px solid #333; cursor: pointer;
            transition: background 0.2s, transform 0.2s; position: relative;
        }
        .cell:hover { background: #333; z-index: 10; }
        .cell.selected { border: 2px solid #fff; box-shadow: 0 0 8px rgba(255,255,255,0.8); z-index: 20; }

        .sword {
            position: absolute; width: 4px; height: 40px;
            background: linear-gradient(to bottom, rgba(255,215,0,0), #ffd700, #fff);
            box-shadow: 0 0 10px #ffd700, 0 0 20px rgba(255,215,0,0.5);
            pointer-events: none; z-index: 1000; border-radius: 2px;
            animation: fly var(--fly-duration, 0.6s) ease-in forwards;
        }
        @keyframes fly {
            0% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) rotate(var(--rot)) scale(1); }
            100% { opacity: 0; transform: translate(var(--end-x), var(--end-y)) rotate(var(--rot)) scale(0.2); }
        }

        .explosion {
            position: absolute; width: 20px; height: 20px;
            background: radial-gradient(circle, #fff, #ffd700, transparent);
            border-radius: 50%; pointer-events: none; z-index: 1000;
            animation: explode 0.4s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
        }

        /* 佛法归宗 - 金色佛光效果 */
        .buddha-light {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(255,215,0,0.8), rgba(255,215,0,0.4), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: buddhaFly 0.8s ease-out forwards;
            box-shadow: 0 0 30px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4);
        }
        @keyframes buddhaFly {
            0% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) scale(0.5) rotate(0deg); }
            50% { opacity: 1; transform: translate(var(--mid-x), var(--mid-y)) scale(1.2) rotate(180deg); }
            100% { opacity: 0; transform: translate(var(--end-x), var(--end-y)) scale(0.3) rotate(360deg); }
        }

        /* 莲花座效果 */
        .lotus-bloom {
            position: absolute;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 999;
            animation: lotusBloom 1.2s ease-out forwards;
        }
        @keyframes lotusBloom {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
        }
        .lotus-petal {
            position: absolute;
            width: 30px;
            height: 60px;
            background: linear-gradient(to top, rgba(255,223,186,0.9), rgba(255,182,193,0.6), transparent);
            border-radius: 50% 50% 50% 50% / 80% 80% 20% 20%;
            transform-origin: bottom center;
        }

        /* 恶魔群潮 - 暗黑效果 */
        .demon-shadow {
            position: absolute;
            width: 50px;
            height: 70px;
            pointer-events: none;
            z-index: 1000;
            animation: demonRush 0.7s ease-in forwards;
        }
        .demon-body {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(75,0,130,0.9), rgba(0,0,0,0.8));
            border-radius: 30% 30% 50% 50%;
            box-shadow: 0 0 20px rgba(75,0,130,0.8), inset 0 0 10px rgba(255,0,255,0.3);
        }
        .demon-horn {
            position: absolute;
            width: 8px;
            height: 25px;
            background: linear-gradient(to bottom, #ff0000, #800000);
            border-radius: 50% 50% 0 0;
            top: -15px;
        }
        .demon-horn.left { left: 10px; transform: rotate(-20deg); }
        .demon-horn.right { right: 10px; transform: rotate(20deg); }
        .demon-eye {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #ff0000, #800000);
            border-radius: 50%;
            top: 20px;
            box-shadow: 0 0 10px #ff0000;
        }
        .demon-eye.left { left: 10px; }
        .demon-eye.right { right: 10px; }
        @keyframes demonRush {
            0% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) scale(0.3) rotate(-10deg); }
            100% { opacity: 0; transform: translate(var(--end-x), var(--end-y)) scale(1.5) rotate(10deg); }
        }

        /* 地狱爆炸 */
        .hell-explosion {
            position: absolute;
            width: 150px;
            height: 150px;
            pointer-events: none;
            z-index: 999;
            animation: hellBlast 1s ease-out forwards;
        }
        .hell-fire {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,0,1), rgba(255,100,0,0.9), rgba(150,0,0,0.7), transparent);
            border-radius: 50%;
        }
        @keyframes hellBlast {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.2); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(3); }
        }

        /* 光芒万丈特效 */
        .radiance-beam {
            position: absolute;
            width: 8px;
            height: 300px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.9), rgba(255,215,0,0.8), transparent);
            pointer-events: none;
            z-index: 1000;
            transform-origin: top center;
            animation: radianceShoot 0.6s ease-out forwards;
            box-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 40px rgba(255,255,255,0.4);
        }
        @keyframes radianceShoot {
            0% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) rotate(var(--rot)) scaleY(0.1); }
            100% { opacity: 0; transform: translate(var(--end-x), var(--end-y)) rotate(var(--rot)) scaleY(1.5); }
        }

        /* 天道之眼特效 */
        .heaven-eye {
            position: absolute;
            width: 200px;
            height: 200px;
            pointer-events: none;
            z-index: 1000;
            animation: eyeOpen 1.5s ease-out forwards;
        }
        .eye-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 8px solid rgba(255,215,0,0.9);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255,215,0,0.8), inset 0 0 20px rgba(255,215,0,0.4);
        }
        .eye-inner {
            position: absolute;
            width: 60%;
            height: 60%;
            left: 20%;
            top: 20%;
            background: radial-gradient(circle, #ffffff, #ffd700, #ff8c00, transparent);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255,215,0,0.9);
        }
        .eye-pupil {
            position: absolute;
            width: 25%;
            height: 25%;
            left: 37.5%;
            top: 37.5%;
            background: radial-gradient(circle, #000000, #330000);
            border-radius: 50%;
            box-shadow: 0 0 15px #000000;
        }
        @keyframes eyeOpen {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(0deg); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(0.8) rotate(180deg); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(360deg); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2) rotate(720deg); }
        }

        /* 大环秋天指特效 */
        .heaven-ring {
            position: absolute;
            border: 5px solid rgba(0,255,255,0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: ringExpand 1s ease-out forwards;
            box-shadow: 0 0 30px rgba(0,255,255,0.8), 0 0 60px rgba(0,200,255,0.4);
        }
        @keyframes ringExpand {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.1) rotate(0deg); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(5) rotate(720deg); }
        }

        /* 时空移位特效 */
        .time-portal {
            position: absolute;
            width: 150px;
            height: 150px;
            pointer-events: none;
            z-index: 1000;
            animation: portalSpin 1.2s ease-out forwards;
        }
        .portal-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 6px solid;
            border-radius: 50%;
            box-sizing: border-box;
        }
        .portal-ring:nth-child(1) { border-color: rgba(138,43,226,0.9); animation: portalPulse 0.3s infinite; }
        .portal-ring:nth-child(2) { width: 70%; height: 70%; left: 15%; top: 15%; border-color: rgba(75,0,130,0.8); animation: portalPulse 0.3s infinite 0.1s; }
        .portal-ring:nth-child(3) { width: 40%; height: 40%; left: 30%; top: 30%; border-color: rgba(148,0,211,0.9); animation: portalPulse 0.3s infinite 0.2s; }
        @keyframes portalSpin {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5) rotate(0deg); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.3) rotate(360deg); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(720deg); }
        }
        @keyframes portalPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .time-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(138,43,226,0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 999;
            animation: particleSwirl 0.8s ease-out forwards;
            box-shadow: 0 0 10px rgba(138,43,226,0.8);
        }
        @keyframes particleSwirl {
            0% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) scale(1); }
            100% { opacity: 0; transform: translate(var(--end-x), var(--end-y)) scale(0.3); }
        }

        /* 紫气东来特效 */
        .purple-cloud {
            position: absolute;
            width: 60px;
            height: 40px;
            background: radial-gradient(ellipse, rgba(128,0,128,0.8), rgba(75,0,130,0.4), transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: purpleDrift 1s ease-out forwards;
            box-shadow: 0 0 25px rgba(128,0,128,0.7);
        }
        @keyframes purpleDrift {
            0% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) scale(0.5); }
            100% { opacity: 0; transform: translate(var(--end-x), var(--end-y)) scale(1.5); }
        }

        /* 万法归宗特效 */
        .dharma-symbol {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,215,0,0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: dharmaGather 0.9s ease-out forwards;
            box-shadow: 0 0 20px rgba(255,215,0,0.8);
        }
        .dharma-symbol::before,
        .dharma-symbol::after {
            content: '';
            position: absolute;
            background: rgba(255,215,0,0.9);
        }
        .dharma-symbol::before {
            width: 100%;
            height: 3px;
            top: 50%;
            left: 0;
            margin-top: -1.5px;
        }
        .dharma-symbol::after {
            width: 3px;
            height: 100%;
            left: 50%;
            top: 0;
            margin-left: -1.5px;
        }
        @keyframes dharmaGather {
            0% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) scale(0.3) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--end-x), var(--end-y)) scale(1.2) rotate(360deg); }
        }

        /* 空间转移特效 */
        .space-ripple {
            position: absolute;
            border: 3px solid rgba(0,255,255,0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: spaceExpand 0.7s ease-out forwards;
            box-shadow: 0 0 15px rgba(0,255,255,0.6), inset 0 0 10px rgba(0,255,255,0.3);
        }
        @keyframes spaceExpand {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(4); }
        }

        /* 反复横跳特效 */
        .jump-ball {
            position: absolute;
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, #ff6b6b, #ee5a24);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: jumpBounce 0.6s ease-out forwards;
            box-shadow: 0 0 15px rgba(255,107,107,0.8);
        }
        @keyframes jumpBounce {
            0% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) scale(1); }
            25% { opacity: 1; transform: translate(var(--mid-x), var(--mid-y1)) scale(1.2); }
            50% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) scale(1); }
            75% { opacity: 1; transform: translate(var(--mid-x), var(--mid-y2)) scale(1.2); }
            100% { opacity: 0; transform: translate(var(--end-x), var(--end-y)) scale(0.5); }
        }

        /* 绚丽光彩特效 */
        .glorious-particle {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: gloriousSpark 0.8s ease-out forwards;
        }
        @keyframes gloriousSpark {
            0% { opacity: 1; transform: translate(var(--start-x), var(--start-y)) scale(1); }
            100% { opacity: 0; transform: translate(var(--end-x), var(--end-y)) scale(0.2); }
        }

        /* 旋转特效 */
        .rotate-effect {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 5px solid;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: rotateSpin 1.2s ease-out forwards;
        }
        @keyframes rotateSpin {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.3) rotate(0deg); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2.5) rotate(var(--rotate-angle)); }
        }

        /* 金色圆环特效 */
        .golden-ring {
            position: absolute;
            pointer-events: none;
            z-index: 1000;
            border: 4px solid #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                        0 0 40px rgba(255, 215, 0, 0.4),
                        inset 0 0 20px rgba(255, 215, 0, 0.3);
        }

        /* 圆环爆炸特效 */
        .ring-explosion {
            position: absolute;
            width: 100px;
            height: 100px;
            pointer-events: none;
            z-index: 1001;
            border: 4px solid #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 215, 0, 1),
                        0 0 60px rgba(255, 165, 0, 0.6);
            animation: ringExplode 0.6s ease-out forwards;
        }
        @keyframes ringExplode {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(2);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(4);
            }
        }
    </style>
</head>
<body>

    <div class="grid-container" id="grid"></div>

    <div class="controls">
        <!-- 第一行：重置、3D旋转、万剑归宗、佛法归宗、恶魔群潮 -->
        <div class="control-row">
            <button id="btnReset">重置</button>
            <button id="btnRotate" disabled>3D旋转</button>
            <button id="btnSword" disabled>万剑归宗</button>
            <button id="btnBuddha" disabled>佛法归宗</button>
            <button id="btnDemon" disabled>恶魔群潮</button>
        </div>
        <!-- 第二行：光芒万丈、天道之眼、大环秋天指、紫气东来、万法归宗 -->
        <div class="control-row">
            <button id="btnRadiance" disabled>光芒万丈</button>
            <button id="btnHeavenEye" disabled>天道之眼</button>
            <button id="btnRing" disabled>大环秋天指</button>
            <button id="btnPurple" disabled>紫气东来</button>
            <button id="btnAllDharma" disabled>万法归宗</button>
        </div>
        <!-- 第三行：空间转移、反复横跳、绚丽光彩、时空移位、圆环 -->
        <div class="control-row">
            <button id="btnSpace" disabled>空间转移</button>
            <button id="btnJump" disabled>反复横跳</button>
            <button id="btnGlorious" disabled>绚丽光彩</button>
            <button id="btnTimeShift" disabled>时空移位</button>
            <button id="btnRingEffect" disabled>圆环</button>
        </div>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const grid = document.getElementById('grid');
    const btnReset = document.getElementById('btnReset');
    const btnRotate = document.getElementById('btnRotate');
    const btnSword = document.getElementById('btnSword');
    const btnBuddha = document.getElementById('btnBuddha');
    const btnDemon = document.getElementById('btnDemon');
    const btnRadiance = document.getElementById('btnRadiance');
    const btnHeavenEye = document.getElementById('btnHeavenEye');
    const btnRing = document.getElementById('btnRing');
    const btnPurple = document.getElementById('btnPurple');
    const btnAllDharma = document.getElementById('btnAllDharma');
    const btnSpace = document.getElementById('btnSpace');
    const btnJump = document.getElementById('btnJump');
    const btnGlorious = document.getElementById('btnGlorious');
    const btnTimeShift = document.getElementById('btnTimeShift');
    const btnRingEffect = document.getElementById('btnRingEffect');

    let selectedCell = null;
    let isRotated = false;

    for (let i = 0; i < 100; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.row = Math.floor(i / 10) + 1;

    function createGoldenRing(x, y, shouldExplode) {
        const ring = document.createElement('div');
        ring.className = 'golden-ring';
        
        // 随机大小
        const size = 50 + Math.random() * 100;
        ring.style.width = `${size}px`;
        ring.style.height = `${size}px`;
        ring.style.left = `${x - size / 2}px`;
        ring.style.top = `${y - size / 2}px`;
        
        document.body.appendChild(ring);
        
        // 动画参数
        let currentX = x - size / 2;
        let currentY = y - size / 2;
        let rotation = 0;
        let vx = (Math.random() - 0.5) * 4;
        let vy = (Math.random() - 0.5) * 4;
        let rotationSpeed = (Math.random() - 0.5) * 10;
        
        const startTime = Date.now();
        const duration = shouldExplode ? 5000 : 5000;
        
        function animate() {
            const elapsed = Date.now() - startTime;
            
            if (elapsed >= duration) {
                if (shouldExplode) {
                    // 爆炸效果
                    createRingExplosion(currentX + size / 2, currentY + size / 2);
                }
                ring.remove();
                return;
            }
            
            // 随机改变速度
            vx += (Math.random() - 0.5) * 0.5;
            vy += (Math.random() - 0.5) * 0.5;
            
            // 限制速度
            vx = Math.max(-6, Math.min(6, vx));
            vy = Math.max(-6, Math.min(6, vy));
            
            // 更新位置
            currentX += vx;
            currentY += vy;
            
            // 边界反弹
            if (currentX < 0 || currentX > window.innerWidth - size) {
                vx *= -1;
                currentX = Math.max(0, Math.min(window.innerWidth - size, currentX));
            }
            if (currentY < 0 || currentY > window.innerHeight - size) {
                vy *= -1;
                currentY = Math.max(0, Math.min(window.innerHeight - size, currentY));
            }
            
            // 更新旋转
            rotation += rotationSpeed;
            
            // 应用样式
            ring.style.left = `${currentX}px`;
            ring.style.top = `${currentY}px`;
            ring.style.transform = `rotate(${rotation}deg)`;
            
            // 淡出效果
            const opacity = 1 - elapsed / duration;
            ring.style.opacity = Math.max(0, opacity);
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // 播放声音
        playSound(400 + Math.random() * 200, 'sine', 0.2);
    }

    function createRingExplosion(x, y) {
        const explosion = document.createElement('div');
        explosion.className = 'ring-explosion';
        explosion.style.left = `${x}px`;
        explosion.style.top = `${y}px`;
        
        document.body.appendChild(explosion);
        
        // 播放爆炸音效
        playSound(200, 'sawtooth', 0.5);
        playSound(150, 'square', 0.3);
        
        setTimeout(() => explosion.remove(), 600);
    }

</script>
</body>
</html>
